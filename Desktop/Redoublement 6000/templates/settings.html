<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramètres - Redoublement 8000</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .header-glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            padding: 0;
            cursor: pointer;
        }

        .settings-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .form-label {
            color: var(--text-secondary);
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .form-select:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--accent-blue);
            color: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        .btn-save {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 30px 20px 10px;
            color: var(--text-primary);
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin: 20px;
            color: #bfdbfe;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header-glass">
        <a href="/" class="back-btn">←</a>
        <h1 class="header-title">Paramètres</h1>
        <div style="width: 24px;"></div> <!-- Spacer for center alignment -->
    </header>

    <div class="info-box">
        ℹ️ Ces réglages permettent d'adapter le calcul des moyennes à ta situation (Alternance, Spécialité...).
    </div>

    <form action="/save-config" method="post" class="settings-card">

        <div class="mb-3">
            <label class="form-label">Semestre Actuel</label>
            <select name="semester" class="form-select">
                <option value="S3" {% if settings['semester']=='S3' %}selected{% endif %}>Semestre 3</option>
                <option value="S4" {% if settings['semester']=='S4' %}selected{% endif %}>Semestre 4 (Projection)
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Parcours</label>
            <select name="option" class="form-select">
                <option value="EMS" {% if settings['option']=='EMS' %}selected{% endif %}>EMS (Exploitation &
                    Modélisation Statistique)</option>
                <option value="AL" {% if settings['option']=='AL' %}selected{% endif %}>AL (Analyse de Données & BI)
                </option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label">Statut</label>
            <select name="status" class="form-select">
                <option value="FI" {% if settings['status']=='FI' %}selected{% endif %}>Formation Initiale (Classique)
                </option>
                <option value="FA" {% if settings['status']=='FA' %}selected{% endif %}>Alternance</option>
            </select>
        </div>

        <button type="submit" class="btn-save">Enregistrer</button>
    </form>

    <div class="text-center mt-5">
        <p class="text-muted">Connecté en tant que <strong>{{ user }}</strong></p>
        <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-4">Se déconnecter</a>
    </div>

</body>

</html>
